metricbeat.modules:
  - module: docker
    metricsets:
      - container
      - cpu
      - diskio
      - healthcheck
      - memory
      - network
    hosts:
      - "unix:///var/run/docker.sock"
    period: 10s

  - module: prometheus
    period: 10s
    hosts:
      - "prometheus:9090"
    metrics_path: /metrics

output.elasticsearch:
  hosts:
    - "http://elasticsearch:9200"

setup.kibana:
  host: "http://kibana:5601"

logging.to_files: false
