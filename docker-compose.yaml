services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: codeflix-catalog-api-python:dev
    container_name: codeflix-catalog-api-python
    working_dir: /app
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app/src
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: codeflix-catalog-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
