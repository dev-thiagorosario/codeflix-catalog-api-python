name: codeflix-catalog-api-python

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: codeflix-catalog-api-python:dev
    container_name: codeflix-api
    working_dir: /app
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_DEBUG: "false"
      DJANGO_RUNSERVER: "false"
      DJANGO_SETTINGS_MODULE: config.settings
      GUNICORN_WORKERS: "2"
      PYTHONPATH: /app/src
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codeflix

  nginx:
    image: nginx:1.27-alpine
    container_name: codeflix-catalog-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - codeflix

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: codeflix-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./.docker/.prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      app:
        condition: service_healthy
      nginx:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    networks:
      - codeflix

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: codeflix-elasticsearch
    profiles:
      - elastic
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - codeflix

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: codeflix-kibana
    profiles:
      - elastic
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - codeflix

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.15.3
    container_name: codeflix-apm-server
    profiles:
      - elastic
    ports:
      - "${APM_SERVER_PORT:-8200}:8200"
    volumes:
      - ./.docker/.elastic/apm/apm-server.yml:/usr/share/apm-server/apm-server.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
    command:
      - --strict.perms=false
    networks:
      - codeflix

  heartbeat:
    image: docker.elastic.co/beats/heartbeat:8.15.3
    container_name: codeflix-heartbeat
    profiles:
      - elastic
    volumes:
      - ./.docker/.elastic/beats/heartbeat/heartbeat.yml:/usr/share/heartbeat/heartbeat.yml:ro
    depends_on:
      app:
        condition: service_healthy
      nginx:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command:
      - --strict.perms=false
    networks:
      - codeflix

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.15.3
    container_name: codeflix-metricbeat
    profiles:
      - elastic
    user: root
    volumes:
      - ./.docker/.elastic/beats/metric/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      prometheus:
        condition: service_started
    command:
      - --strict.perms=false
    networks:
      - codeflix

volumes:
  prometheus-data:

networks:
  codeflix:
    driver: bridge
